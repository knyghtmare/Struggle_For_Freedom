#textdomain wesnoth-Struggle_For_Freedom

[unit_type]
    id=Door
    name= _ "Door"
    race=mechanical
    image="misc/blank-hex.png"
    image_icon="terrain/dark-gate-se.png"
    ellipse=none
    hitpoints=8
    movement_type=none
    movement=0
    level=0
    alignment=neutral
    advances_to=null
    cost=1
    usage=null
    hide_help=true
    [abilities]
        {ABILITY_STEADFAST}
    [/abilities]
    description= _ "The door will open only to those who are allied with its owners, unless struck down by their enemies first."
    {DEFENSE_ANIM "misc/blank-hex.png" "misc/blank-hex.png" gate.ogg}
    die_sound=gate-fall.ogg
    [death]
        start_time=0
        [frame]
            duration,image=0,"misc/blank-hex.png"
        [/frame]
    [/death]

    #
    # Core Gate terrains
    #
    [event]
        id=naia_door_handler_1
        name=last breath
        first_time_only=no
        [filter]
            type=Door
            [filter_location]
                terrain="*^P*/,*^P*\,*^P*|"
            [/filter_location]
        [/filter]

        [lua]
            [args]
                x,y=$x1,$y1
            [/args]

            code=<<
                local loc = ...
                local newtile = wesnoth.current.map[{loc.x, loc.y}] .. "o"
                wesnoth.current.map[{loc.x, loc.y}] = wesnoth.map.replace_overlay(newtile)
            >>
        [/lua]

        [redraw]
            side=1
        [/redraw]
    [/event]

    #  [event]
    #      name=last breath
    #      first_time_only=no
    #      [filter]
    #          type=Door
    #          [filter_location]
    #              terrain=*^Z/,*^Z\
    #          [/filter_location]
    #      [/filter]

    #      [remove_terrain_overlays]
    #          x,y=$x1,$y1
    #      [/remove_terrain_overlays]

    #      [redraw]
    #          side=1
    #      [/redraw]
    #  [/event]

    [event]
        name=die
        first_time_only=no
        [filter]
            type=Door
        [/filter]

        [modify_unit]
            [filter]
                id=$second_unit.id
            [/filter]
            experience="$($second_unit.experience - 4)" 
        [/modify_unit]
    [/event]
[/unit_type]
